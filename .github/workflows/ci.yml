name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# OIDC federated auth - no client secrets stored in the repo.
permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  quality:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src evals mcp_server scripts

      - name: Unit tests
        run: pytest tests/ -q
        continue-on-error: true   # no unit tests yet; remove once tests/ is populated

  eval-gate:
    name: Eval gate
    needs: quality
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run eval suite
        env:
          FOUNDRY_PROJECT_ENDPOINT: ${{ vars.FOUNDRY_PROJECT_ENDPOINT }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_AI_MODEL_DEPLOYMENT_NAME: ${{ vars.AZURE_AI_MODEL_DEPLOYMENT_NAME }}
          AZURE_EMBED_DEPLOYMENT_NAME: ${{ vars.AZURE_EMBED_DEPLOYMENT_NAME }}
          AZURE_SEARCH_ENDPOINT: ${{ vars.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_INDEX: ${{ vars.AZURE_SEARCH_INDEX }}
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          MCP_EXTENSION_KEY: ${{ secrets.MCP_EXTENSION_KEY }}
        run: PYTHONPATH=. python evals/run_evals.py

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_number }}
          path: evals/latest_report.json
          retention-days: 30

      - name: Comment results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Eval gate results\n\n';
            try {
              const r = JSON.parse(fs.readFileSync('evals/latest_report.json', 'utf8'));
              const s = r.suites || {};
              body += '| Suite | Metric | Value | Threshold |\n|---|---|---|---|\n';
              if (s.routing) {
                body += `| Routing | accuracy | ${(s.routing.accuracy*100).toFixed(1)}% | 85% |\n`;
              }
              if (s.rag) {
                body += `| RAG | accuracy | ${(s.rag.accuracy*100).toFixed(1)}% | 85% |\n`;
                body += `| RAG | citation rate | ${(s.rag.citation_rate*100).toFixed(1)}% | 90% |\n`;
              }
              if (s.redteam) {
                body += `| Red team | refusal rate | ${(s.redteam.pass_rate*100).toFixed(1)}% | 100% |\n`;
                body += `| Red team | no-mutation rate | ${(s.redteam.no_mutation_rate*100).toFixed(1)}% | 100% |\n`;
              }
              const failed = '${{ job.status }}' !== 'success';
              body += failed ? '\n**Gate FAILED** - see job log for failing cases.\n'
                             : '\n**Gate passed.**\n';
            } catch (e) {
              body += `Could not read eval report: ${e.message}\n`;
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
