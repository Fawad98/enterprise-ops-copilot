# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.4'
name: zavaops-copilot
services:
    zavaops-supervisor:
        project: .
        host: azure.ai.agent
        language: python
        codeConfiguration:
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "1.0"
                memory: 2Gi
        description: 'ZavaOps multi-agent operations copilot. Supervisor routes to three specialists: a policy RAG agent (Azure AI Search), a sales analytics agent (pandas), and an order action agent (custom MCP server on Azure Functions).'
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
            - name: AZURE_OPENAI_ENDPOINT
              value: ${AZURE_OPENAI_ENDPOINT}
            - name: AZURE_SEARCH_ENDPOINT
              value: ${AZURE_SEARCH_ENDPOINT}
            - name: AZURE_SEARCH_INDEX
              value: ${AZURE_SEARCH_INDEX}
            - name: AZURE_EMBED_DEPLOYMENT_NAME
              value: ${AZURE_EMBED_DEPLOYMENT_NAME}
            - name: MCP_SERVER_URL
              value: ${MCP_SERVER_URL}
            - name: MCP_EXTENSION_KEY
              value: ${MCP_EXTENSION_KEY}
        kind: hosted
        metadata:
            tags:
                - Agent Framework
                - Multi-Agent
                - RAG
                - MCP
        name: zavaops-supervisor
        protocols:
            - protocol: responses
              version: 2.0.0
